<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draft Tracker — All22</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 16px; }
    .toolbar select { width: auto; min-width: 140px; }
    .toolbar label { font-size: .8rem; color: var(--text-dim); margin-bottom: 3px; display: block; }
    .new-btn { margin-left: auto; white-space: nowrap; }
    .table-wrap { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; min-width: 560px; font-size: .875rem; }
    th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-weight: 500; cursor: pointer; white-space: nowrap; user-select: none; }
    th:hover { color: var(--text); }
    th.sorted { color: var(--accent); }
    td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: var(--surface); }
    tr { cursor: pointer; }
    .rating { color: #f5c842; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: .75rem; background: var(--border); }
    .empty { text-align: center; padding: 40px; color: var(--text-dim); }
  </style>
</head>
<body>
  <nav>
    <span class="brand">All22</span>
    <a href="/">Home</a>
    <a href="/drafts.html" class="active">Draft Tracker</a>
    <a href="/analytics.html">Analytics</a>
    <a href="/compare.html">Analyst Compare</a>
    <a href="/convert.html">Converters</a>
    <a href="/yahoo.html">Yahoo</a>
    <form method="POST" action="/logout"><button type="submit" class="link">Log out</button></form>
  </nav>
  <div id="error-banner"></div>
  <main>
    <h1>Draft Tracker</h1>
    <div class="toolbar">
      <div>
        <label>Site</label>
        <select id="f-site"><option value="">All sites</option>
          <option>Underdog</option><option>Yahoo</option><option>Sleeper</option><option>Other</option>
        </select>
      </div>
      <div>
        <label>Type</label>
        <select id="f-type"><option value="">All types</option>
          <option>Best Ball</option><option>Mock</option><option>Season League</option>
        </select>
      </div>
      <div>
        <label>Strategy</label>
        <select id="f-strategy"><option value="">All strategies</option>
          <option>Hero RB</option><option>Zero RB</option><option>Robust RB</option>
          <option>Anchor TE</option><option>Late-Round QB</option><option>Balanced</option><option>Other</option>
        </select>
      </div>
      <div>
        <label>Sort</label>
        <select id="f-sort">
          <option value="">Date (newest)</option>
          <option value="rating">Rating (highest)</option>
        </select>
      </div>
      <a href="/drafts-new.html"><button class="new-btn">+ New Draft</button></a>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Site</th>
              <th>Type</th>
              <th>Strategy</th>
              <th>Rating</th>
              <th>Picks</th>
            </tr>
          </thead>
          <tbody id="drafts-body">
            <tr><td colspan="6" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
  <script>
    const filters = document.querySelectorAll('#f-site,#f-type,#f-strategy,#f-sort');
    filters.forEach((el) => el.addEventListener('change', load));

    async function load() {
      const params = new URLSearchParams();
      const site = document.getElementById('f-site').value;
      const type = document.getElementById('f-type').value;
      const strat = document.getElementById('f-strategy').value;
      const sort = document.getElementById('f-sort').value;
      if (site)  params.set('site', site);
      if (type)  params.set('draftType', type);
      if (strat) params.set('strategy', strat);
      if (sort)  params.set('sort', sort);

      const data = await apiFetch('/api/drafts?' + params).catch(() => null);
      if (!data) return;
      render(data);
    }

    function stars(n) {
      if (!n) return '<span class="muted">—</span>';
      return '<span class="rating">' + '★'.repeat(n) + '</span>';
    }

    function render(rows) {
      const tbody = document.getElementById('drafts-body');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No drafts yet. <a href="/drafts-new.html">Log your first draft →</a></td></tr>';
        return;
      }
      tbody.innerHTML = rows.map((d) => `
        <tr onclick="location.href='/draft-detail.html?id=${d.id}'">
          <td>${d.drafted_at ? new Date(d.drafted_at).toLocaleString() : '—'}</td>
          <td>${esc(d.site)}${d.is_test ? ' <span style="font-size:.7rem;color:#e6a817;border:1px solid #e6a817;border-radius:10px;padding:1px 5px">TEST</span>' : ''}</td>
          <td>${esc(d.draft_type)}</td>
          <td>${d.strategy ? `<span class="badge">${esc(d.strategy)}</span>` : '<span class="muted">—</span>'}</td>
          <td>${stars(d.rating)}</td>
          <td>${d.my_pick_count || 0} / ${d.total_picks || 0}</td>
        </tr>`
      ).join('');
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    load();
  </script>
</body>
</html>
